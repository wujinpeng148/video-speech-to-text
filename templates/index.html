<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频语音转文字翻译工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            <h1>视频语音转文字翻译</h1>
        </div>
        <span class="subtitle">上传视频 → 提取语音 → 编辑文本 → 翻译</span>
    </header>

    <main class="main-container">
        <!-- 左侧：上传 + 编辑区 -->
        <section class="panel panel-left">
            <!-- 上传区域 -->
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="videoInput" accept="video/*" hidden>
                    <div class="upload-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <p class="upload-text">拖拽视频文件到此处或 <span class="upload-link">点击上传</span></p>
                    <p class="upload-hint">支持 MP4、AVI、MOV、MKV、WebM 等格式，最大 500MB</p>
                </div>
                <div class="upload-progress hidden" id="uploadProgress">
                    <div class="spinner"></div>
                    <p id="progressText">正在处理视频...</p>
                </div>
                <!-- 语言检测结果确认区 -->
                <div class="lang-detect-result hidden" id="langDetectResult">
                    <div class="detect-summary">
                        <span class="detect-icon">&#x1F50D;</span>
                        <span class="detect-label">检测到语言：</span>
                        <strong class="detect-lang-name" id="detectedLangName"></strong>
                        <span class="detect-confidence" id="detectedConfidence"></span>
                    </div>
                    <div class="detect-actions">
                        <label class="detect-select-label">如果不是，请手动选择：</label>
                        <select id="manualLangSelect" class="lang-select-input">
                            <option value="">— 使用检测结果 —</option>
                            {% for code, name in languages.items() %}
                            <option value="{{ code }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                        <button class="btn btn-primary" id="startTranscribeBtn">开始语音识别</button>
                    </div>
                </div>
                <!-- 转录进度 -->
                <div class="upload-progress hidden" id="transcribeProgress">
                    <div class="spinner"></div>
                    <p>正在进行语音识别，请耐心等待...</p>
                </div>
                <div class="upload-info hidden" id="uploadInfo">
                    <span class="filename" id="fileName"></span>
                    <button class="btn btn-sm btn-outline" id="reUploadBtn">重新上传</button>
                </div>
            </div>

            <!-- 文本编辑区 -->
            <div class="editor-section">
                <div class="section-header">
                    <h3>📝 识别文本（可编辑）</h3>
                    <div class="section-actions">
                        <span class="word-count" id="wordCount">0 字</span>
                        <button class="btn btn-sm btn-outline" id="proofreadBtn" disabled>🔍 校对</button>
                        <button class="btn btn-sm btn-outline" id="copySourceBtn">复制</button>
                        <button class="btn btn-sm btn-outline" id="clearSourceBtn">清空</button>
                    </div>
                </div>
                <textarea
                    id="sourceText"
                    class="text-editor"
                    placeholder="上传视频后，语音识别结果将显示在这里。你也可以直接粘贴文本进行翻译..."
                    disabled
                ></textarea>
                <!-- 校对结果区 -->
                <div class="proofread-panel hidden" id="proofreadPanel">
                    <div class="proofread-header">
                        <span id="proofreadSummary"></span>
                        <button class="btn btn-sm btn-outline" id="dismissProofreadBtn">关闭</button>
                    </div>
                    <div class="proofread-list" id="proofreadList"></div>
                </div>
            </div>
        </section>

        <!-- 右侧：翻译区 -->
        <section class="panel panel-right">
            <!-- 翻译控制栏 -->
            <div class="translate-controls">
                <div class="lang-select-group">
                    <div class="lang-select">
                        <label>源语言</label>
                        <select id="sourceLang" disabled>
                            <option value="auto">自动检测</option>
                            {% for code, name in languages.items() %}
                            <option value="{{ code }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button class="swap-btn" id="swapLangBtn" title="交换语言">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="17 1 21 5 17 9"/>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <polyline points="7 23 3 19 7 15"/>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                    </button>
                    <div class="lang-select">
                        <label>目标语言</label>
                        <select id="targetLang">
                            {% for code, name in languages.items() %}
                            <option value="{{ code }}" {% if code == 'zh-CN' %}selected{% endif %}>{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" id="translateBtn" disabled>翻译 →</button>
            </div>

            <!-- 翻译结果区 -->
            <div class="result-section">
                <div class="section-header">
                    <h3>🌐 翻译结果</h3>
                    <div class="section-actions">
                        <button class="btn btn-sm btn-outline" id="copyResultBtn">复制</button>
                        <button class="btn btn-sm btn-outline" id="clearResultBtn">清空</button>
                    </div>
                </div>
                <div class="result-area" id="resultArea">
                    <div class="placeholder-text" id="resultPlaceholder">
                        翻译结果将显示在这里
                    </div>
                    <div class="result-content hidden" id="resultContent"></div>
                </div>
                <div class="translate-progress hidden" id="translateProgress">
                    <div class="spinner spinner-sm"></div>
                    <span>翻译中...</span>
                </div>
            </div>
        </section>
    </main>

    <!-- 提示消息 -->
    <div class="toast hidden" id="toast"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
